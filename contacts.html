		}

		.contact-card:hover .copy-icon {

		}

	<script>
		function copyEmail(event) {
			event.preventDefault(); // Prevent opening mail client
			event.stopPropagation(); // Stop bubbling

			const email = "anuragsingh.eu@gmail.com";
			const iconContainer = event.currentTarget;
			const icon = iconContainer.querySelector('i');

			const showSuccess = () => {
				if (icon) {
					icon.className = 'fas fa-check';
					iconContainer.classList.add('copied');
					setTimeout(() => {
						icon.className = 'fas fa-copy';
						iconContainer.classList.remove('copied');
					}, 2000);
				}
			};

			// Fallback for non-secure contexts (HTTP)
			if (navigator.clipboard && window.isSecureContext) {
				navigator.clipboard.writeText(email).then(showSuccess).catch(function(err) {
					console.error('Could not copy text: ', err);
				});
			} else {
				let textArea = document.createElement("textarea");
				textArea.value = email;
				// Move text area out of viewport
				textArea.style.position = "fixed";
				textArea.style.left = "-999999px";
				textArea.style.top = "-999999px";
				document.body.appendChild(textArea);
				textArea.focus();
				textArea.select();
				try {
					document.execCommand('copy');
					showSuccess();
				} catch (err) {
					console.error('Fallback: Oops, unable to copy', err);
				}
				document.body.removeChild(textArea);
			}
		}
	</script>
